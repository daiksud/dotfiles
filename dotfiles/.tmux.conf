# Prefix
unbind C-b
set -g prefix C-t
bind C-t send-prefix

# General
set -g default-terminal "xterm-ghostty"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g allow-passthrough all
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'ghostty*:extkeys'
set -as terminal-features 'tmux*:extkeys'
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g history-limit 50000
set -g focus-events on

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# New window / split panes (keep current path)
bind c new-window -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Pass Shift+Enter as kitty keyboard protocol sequence (apps expect \e[13;2u)
bind -n S-Enter send-keys "\e[13;2u"

# Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Tokyo Night settings
set -g @tokyo-night-tmux_theme storm
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style none
set -g @tokyo-night-tmux_zoom_id_style none
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative

# Pane output logging (for URL extraction)
# Start logging for all existing panes on config reload
run-shell "tmux list-panes -a -F '#{pane_id}' | xargs -I{} ~/.tmux/start-logging.sh {}"
# Start logging for new panes automatically
set-hook -g pane-focus-in 'run "~/.tmux/start-logging.sh #{pane_id}"'

# Open URL from pane log (prefix + u)
# Extract URLs before popup opens (#{pane_id} differs inside popup)
bind u \
  run-shell "~/.tmux/collect-urls.sh '#{pane_id}'" \; \
  display-popup -E -w 80% -h 50% "~/.tmux/open-url.sh"

# Initialize TPM (keep at the bottom)
# Prepend Homebrew paths so plugin scripts find bash 5+ via env(1)
run 'PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH" ~/.tmux/plugins/tpm/tpm'
