# Prefix
unbind C-b
set -g prefix C-t
bind C-t send-prefix

# General
set -g default-terminal "xterm-ghostty"

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# New window / split panes (keep current path)
bind c new-window -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Pass Shift+Enter as kitty keyboard protocol sequence (apps expect \e[13;2u)
bind -n S-Enter send-keys "\e[13;2u"

# Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Tokyo Night settings
set -g @tokyo-night-tmux_theme storm

# Initialize TPM (keep at the bottom)
# Prepend Homebrew paths so plugin scripts find bash 5+ via env(1)
run 'PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH" ~/.tmux/plugins/tpm/tpm'
